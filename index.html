<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>León Centro — Check List</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    background: #F4F6F9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,30,60,0.1);
  }
  .logo-dot { color: #00A8E0; font-size: 28px; }
  h1 {
    font-size: 20px;
    color: #001E3C;
    margin: 8px 0 4px;
  }
  p {
    font-size: 14px;
    color: #5C6675;
    margin-bottom: 28px;
  }
  a.btn {
    display: block;
    background: #001E3C;
    color: white;
    text-decoration: none;
    padding: 16px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    border-bottom: 3px solid #00A8E0;
  }
  a.btn:active { background: #000F1E; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-dot">●</div>
    <h1>Check List de Salida</h1>
    <p>León Centro</p>
    <a class="btn" href="checklist_salida.html">Abrir Check List</a>
  </div>
</body>
</html>
